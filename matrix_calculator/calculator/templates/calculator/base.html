<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Matrix Calculator{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --border: #2e3450;
      --accent: #4f7cff;
      --accent2: #00d4aa;
      --text: #e8eaf2;
      --muted: #7b82a0;
      --danger: #ff5c6a;
      --success: #00d4aa;
      --radius: 10px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
    }
    nav .brand {
      font-weight: 700;
      font-size: 16px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--text); }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }

    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-success { background: var(--success); color: #0f1117; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    input, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 10px;
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input[type="number"] { text-align: right; }

    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }

    .form-group { margin-bottom: 16px; }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .messages { margin-bottom: 20px; }
    .message {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .message.success { background: #00d4aa22; border: 1px solid var(--success); color: var(--success); }
    .message.error { background: #ff5c6a22; border: 1px solid var(--danger); color: var(--danger); }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: right;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    th:first-child { text-align: left; }
    td {
      border: 1px solid var(--border);
      padding: 5px 8px;
      text-align: right;
      white-space: nowrap;
    }
    td:first-child { text-align: left; }
    tr:hover td { background: #ffffff08; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .summary-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-card .value { font-size: 22px; font-weight: 700; color: var(--accent2); margin-top: 4px; }

    .steps {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .step {
      flex: 1;
      padding: 12px 16px;
      font-size: 12px;
      color: var(--muted);
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .step:last-child { border-right: none; }
    .step.active { color: var(--accent); font-weight: 600; background: #4f7cff15; }
    .step.done { color: var(--success); }

    .table-wrap { overflow-x: auto; }

    .heatmap-cell {
      display: inline-block;
      width: 100%;
      text-align: right;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .chart-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 768px) {
      .chart-row { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }

    canvas { max-width: 100%; }

    .matrix-table td { font-size: 11px; padding: 3px 6px; }
    .matrix-table th { font-size: 10px; padding: 4px 6px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav>
  <a href="{% url 'calculator:index' %}" class="brand">Matrix Calculator</a>
  <a href="{% url 'calculator:index' %}">Scenarios</a>
  <a href="{% url 'calculator:compare' %}">Compare</a>
</nav>

<div class="container">
  {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
